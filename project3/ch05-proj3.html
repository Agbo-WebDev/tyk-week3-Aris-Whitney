<!DOCTYPE html>
<html lang="en">
<head >
   <meta charset="utf-8">
   <title>Chapter 5</title>
   <link rel="stylesheet" href="reset.css" />
   <link rel="stylesheet" href="ch05-proj3.css" />
</head>
<body>
<header>
     <h1>Share Your Travels</h1>
     <p>let us know where you've been</p>
</header>
<main>
   <section>
      <form method="GET" action="https://www.randyconnolly.com/tests/process.php">
         <fieldset>
            <legend>Photo Details</legend>

            <table>

               <tr>
                  <td><label for="title">Title</label></td>
                  <td><input type="text" id="title" name="title" required></td>
               </tr>

               <tr>
                  <td><label for="description">Description</label></td>
                  <td><textarea id="description" name="description" rows="4" cols="40"></textarea></td>
               </tr>

               <tr>
                  <td><label for="city">City</label></td>
                  <td>
                     <select id="city" name="city">
                        <option value="0">Select City</option>
                        <option value="1">Paris</option>
                        <option value="2">Rome</option>
                        <option value="3">Tokyo</option>
                        <option value="4">New York</option>
                     </select>
                  </td>
               </tr>

               <tr>
                  <td><label for="country">Country</label></td>
                  <td>
                     <select id="country" name="country">
                        <option value="0">Select Country</option>
                        <option value="1">France</option>
                        <option value="2">Italy</option>
                        <option value="3">Japan</option>
                        <option value="4">United States</option>
                     </select>
                  </td>
               </tr>

               <tr>
                  <td>Continent</td>
                  <td>
                     <input type="radio" id="europe" name="continent" value="Europe">
                     <label for="europe">Europe</label>

                     <input type="radio" id="asia" name="continent" value="Asia">
                     <label for="asia">Asia</label>

                     <input type="radio" id="northamerica" name="continent" value="North America">
                     <label for="northamerica">North America</label>
                  </td>
               </tr>

               <tr>
                  <td>Categories</td>
                  <td>
                     <input type="checkbox" name="category[]" value="Landscape"> Landscape
                     <input type="checkbox" name="category[]" value="City"> City
                     <input type="checkbox" name="category[]" value="People"> People
                     <input type="checkbox" name="category[]" value="Nature"> Nature
                  </td>
               </tr>

               <tr>
                  <td><label for="taken">Date Taken</label></td>
                  <td><input type="date" id="taken" name="dateTaken"></td>
               </tr>

               <tr>
                  <td><label for="rating">Rating (1-5)</label></td>
                  <td><input type="number" id="rating" name="rating" min="1" max="5"></td>
               </tr>

               <tr>
                  <td><label for="photo">Upload Photo</label></td>
                  <td><input type="file" id="photo" name="photo"></td>
               </tr>

               <tr>
                  <td></td>
                  <td>
                     <input type="submit" value="Submit">
                     <input type="reset" value="Clear">
                  </td>
               </tr>

            </table>

         </fieldset>
      </form>
         <fieldset>
            <legend>Photo Details</legend>

         </fieldset>
      </form>       
   </section>
</main>  


</body>
</html>
